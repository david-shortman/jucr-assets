<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Audio</title>
  <style>
    html,body{margin:0;background:transparent;}
    audio{width:100%;display:block;height:40px;}
  </style>
</head>
<body>
  <audio controls preload="none" id="a"></audio>
  <script>
    var src = new URLSearchParams(location.search).get('src') || '';
    // only allow same-origin relative paths under media/
    if (/^media\//.test(src.replace(/^\//,''))) document.getElementById('a').src = src.replace(/^\//,'');
  </script>
</body>
</html>
