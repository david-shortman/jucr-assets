<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Map — Journey Up Coal River</title>
  <link rel="stylesheet" href="jucr-map.css" />
  <style>
    html, body { margin: 0; height: 100%; font-family: Georgia, 'Times New Roman', serif; background:#383838; }
    #app { display: grid; grid-template-rows: auto auto 1fr; height: 100vh; max-width:1100px; margin:0 auto; background:#f5f1e8; }
    .hdr { background:#2b2b2b center/cover no-repeat url(img/upcoalriver-header.jpg); aspect-ratio:898/200; }
    .bar { background:#cdbfa6; border-bottom:3px solid #7a3b2e; display:flex; align-items:center; justify-content:space-between; padding:8px 16px; }
    .bar a { color:#3a2a18; text-decoration:none; font-family:Arial,Helvetica,sans-serif; font-size:13px; }
    .bar .ttl { font-size:18px; color:#7a3b2e; font-weight:bold; }
    #map-host { position:relative; }
    .jucr-map-widget { border:none !important; border-radius:0 !important; height:100% !important; }
  </style>
</head>
<body>
  <div id="app">
    <div class="hdr"></div>
    <div class="bar"><span class="ttl" id="ttl">Map</span><a href="https://journey-up-coal-river.webflow.io/">&larr; Journey Up Coal River</a></div>
    <div id="map-host"></div>
  </div>
  <script>
    var NAMES = { coal_river_101:"History & Social Geography", crm:"Land Use",
      hazy:"A Community & Strip Mining", prenter:"Public Health & Coal Slurry",
      cresources:"Community Resource Mapping", mtr:"What is Mountaintop Removal?",
      wind:"Renewable Energy on Coal River Mountain", blair:"Blair Mountain" };
    var theme = (new URLSearchParams(location.search).get('theme') || 'coal_river_101').replace(/[^a-z0-9_]/gi,'');
    document.getElementById('ttl').textContent = NAMES[theme] || 'Map';
    document.title = (NAMES[theme] || 'Map') + ' — Journey Up Coal River';
    var d = document.createElement('div');
    d.setAttribute('data-jucr-map', 'maps/' + theme + '/');
    d.setAttribute('data-height', '100%');
    document.getElementById('map-host').appendChild(d);
  </script>
  <script src="jucr-map.js" defer></script>
</body>
</html>
